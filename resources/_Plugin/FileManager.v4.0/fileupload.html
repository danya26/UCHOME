	<script>
function toggleFileItem(bt,opt){
	var $li = $($(bt).parents("li").get(0));


	if($li.hasClass(opt)){
		$li.removeClass(opt);
	}else{
		if(opt=="ctrl-open"){
			$(".mfu-file-list li").removeClass('cont-open');
		}

		
		$(".mfu-file-list li").not($li).removeClass(opt);
		$li.addClass(opt);

	}
}
</script>
